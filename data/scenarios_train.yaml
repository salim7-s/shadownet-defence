# All 15 ShadowNet training scenarios (registry mirror of data.py).
# Full graph + attacker_path live in data.py; this file is for discovery,
# docs, and CI validation that YAML ids match ALL_SCENARIOS.

scenarios:
  - id: shadow-easy-1
    name: "Retail POS Breach"
    difficulty: easy
    max_steps: 20
    critical_asset: user-database
    attack_source: "Target 2013 POS Breach"
  - id: shadow-easy-2
    name: "Credential Stuffing Attack"
    difficulty: easy
    max_steps: 20
    critical_asset: customer-records
    attack_source: "Generic Credential Stuffing"
  - id: shadow-easy-3
    name: "SSH Brute Force Intrusion"
    difficulty: easy
    max_steps: 20
    critical_asset: source-repo
    attack_source: "SSH Brute Force Pattern"
  - id: shadow-easy-4
    name: "Phishing to Mailbox Exfil"
    difficulty: easy
    max_steps: 20
    critical_asset: cloud-storage
    attack_source: "Business Email Compromise"
  - id: shadow-easy-5
    name: "DNS Tunneling Exfil"
    difficulty: easy
    max_steps: 20
    critical_asset: hr-database
    attack_source: "DNS Tunneling via DNSCat2"
  - id: shadow-medium-1
    name: "Uber Social Engineering"
    difficulty: medium
